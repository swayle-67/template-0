{% extends "layout.html" %}
{% block body %}

<div class="auth-container">
    <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="subtitle">Log in to your StayEasy account</p>

        <form action="/login" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" name="username" placeholder="Enter your username" type="text" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" placeholder="Enter your password" type="password" required>
            </div>
            <button class="btn btn-primary" style="width:100%; padding: 13px;" type="submit">Log in</button>
        </form>

        <div class="auth-switch">
            Don't have an account? <a href="/register">Sign up</a>
        </div>
    </div>
</div>

{% endblock %}
