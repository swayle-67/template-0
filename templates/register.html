{% extends "layout.html" %}
{% block body %}

<div class="auth-container">
    <div class="auth-card">
        <h1>Create account</h1>
        <p class="subtitle">Join StayEasy and start exploring</p>

        <form action="/register" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" name="username" placeholder="Choose a username" type="text" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" placeholder="At least 6 characters" type="password" required>
            </div>
            <div class="form-group">
                <label for="confirmation">Confirm password</label>
                <input id="confirmation" name="confirmation" placeholder="Repeat your password" type="password" required>
            </div>
            <button class="btn btn-primary" style="width:100%; padding: 13px;" type="submit">Create account</button>
        </form>

        <div class="auth-switch">
            Already have an account? <a href="/login">Log in</a>
        </div>
    </div>
</div>

{% endblock %}
