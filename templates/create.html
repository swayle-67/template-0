{% extends "layout.html" %}
{% block body %}

<div class="page-header">
    <h1>List your place</h1>
</div>

<div class="create-card">
    <form action="/create" method="post">
        <div class="form-group">
            <label for="title">Title</label>
            <input id="title" name="title" placeholder="e.g. Cozy apartment in Cape Town" type="text" required>
        </div>
        <div class="form-group">
            <label for="location">Location</label>
            <input id="location" name="location" placeholder="e.g. Cape Town, South Africa" type="text" required>
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="Describe your place — what makes it special?" required></textarea>
        </div>
        <div class="form-group">
            <label for="price">Price per night (USD)</label>
            <input id="price" name="price" placeholder="0.00" type="number" step="0.01" min="0.01" required>
        </div>
        <div class="form-group">
            <label for="guests">Max guests</label>
            <input id="guests" name="guests" placeholder="1" type="number" min="1" max="20" value="1">
        </div>
        <div class="form-group">
            <label for="image_url">Image URL <span style="font-weight:400; color: var(--muted);">(optional)</span></label>
            <input id="image_url" name="image_url" placeholder="https://..." type="url">
            <div class="img-preview-wrapper" id="img-preview-wrapper">
                <img id="img-preview" src="" alt="Preview">
            </div>
        </div>
        <button class="btn btn-primary" style="width:100%; padding: 13px;" type="submit">Create listing</button>
    </form>
</div>

<script>
    const imgInput = document.getElementById('image_url');
    const previewWrapper = document.getElementById('img-preview-wrapper');
    const previewImg = document.getElementById('img-preview');

    imgInput.addEventListener('input', function() {
        const val = this.value.trim();
        if (val) {
            previewImg.src = val;
            previewImg.onload = () => previewWrapper.classList.add('visible');
            previewImg.onerror = () => previewWrapper.classList.remove('visible');
        } else {
            previewWrapper.classList.remove('visible');
        }
    });
</script>

{% endblock %}
